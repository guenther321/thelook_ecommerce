name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  model-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check every model has a YML file
        run: |
          missing=0
          for sql_file in $(find models/ -name "*.sql" -not -path "*/analysis/*"); do
            dir=$(dirname "$sql_file")
            model_name=$(basename "$sql_file" .sql)
            if ! grep -rq "name: ${model_name}" "${dir}"/*.yml 2>/dev/null; then
              echo "❌ Missing YML entry for: ${sql_file}"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Found ${missing} model(s) without YML documentation."
            exit 1
          else
            echo "✅ All models have YML documentation."
          fi

      - name: Check every model has a frequency tag and a domain tag
        run: |
          missing=0
          for yml_file in $(find models/ -name "*.yml" -not -path "*/analysis/*"); do
            # skip yml files that don't define models (e.g. _sources.yml)
            if ! grep -q "^models:" "$yml_file"; then
              continue
            fi
            model_name=$(grep -A1 "^  - name:" "$yml_file" | grep "name:" | awk '{print $3}')
            # check for at least one frequency tag (daily* or weekly*)
            if ! grep -q '"daily\|"weekly' "$yml_file"; then
              echo "❌ Missing frequency tag (daily_Xd / weekly_Xm) in: ${yml_file}"
              missing=$((missing + 1))
            fi
            # check for at least one domain tag (domain:*)
            if ! grep -q '"domain:' "$yml_file"; then
              echo "❌ Missing domain tag (domain:X) in: ${yml_file}"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Found ${missing} tagging issue(s). Every model needs a frequency tag and a domain tag."
            echo "Example: tags: [\"daily_30d\", \"domain:orders\"]"
            exit 1
          else
            echo "✅ All models have frequency and domain tags."
          fi
