version: 2

models:
  - name: int_chargeback_transactions
    description: |
      Intermediate layer that standardizes chargeback data across payment processors.
      
      This model provides a unified, processor-agnostic view of chargeback information.
      It is designed to scale - new payment processors (Stripe, PayPal, etc.) can be added
      by creating additional staging models (stg_stripe_chargeback_transactions, etc.)
      and unioning them into this model.
      
      Currently sources only Globepay data, but the structure supports multi-processor expansion.
    
    columns:
      - name: external_ref
        description: Unique external reference identifier for the transaction
      
      - name: status
        description: |
          Payment processor status indicator (TRUE/FALSE).
          NOTE: Purpose is undocumented in Globepay API spec. Requires clarification with data team.
      
      - name: source
        description: Payment processor identifier (e.g., GLOBALPAY, STRIPE, PAYPAL)
            
      - name: has_chargeback
        description: Boolean flag indicating whether the transaction was chargedback
