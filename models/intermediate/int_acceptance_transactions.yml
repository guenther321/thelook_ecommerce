version: 2

models:
  - name: int_acceptance_transactions
    description: |
      Intermediate layer that standardizes acceptance transaction data across payment processors.
      
      This model provides a unified, processor-agnostic view of acceptance transactions.
      It is designed to scale - new payment processors (Stripe, PayPal, etc.) can be added
      by creating additional staging models (stg_stripe_acceptance_transactions, etc.)
      and unioning them into this model.
      
      Currently sources only Globepay data, but the structure supports multi-processor expansion.
    
    columns:
      - name: transaction_ref
        description: Primary key - Internal reference ID for the transaction (processor-agnostic identifier)
        tests:
          - unique
          - not_null
      
      - name: external_ref
        description: External reference identifier from the payment processor (e.g., Globepay transaction ID)
      
      - name: status
        description: |
          Payment processor status indicator (TRUE/FALSE).
          NOTE: Purpose is undocumented in Globepay API spec. Requires clarification with data team.
      
      - name: source
        description: Payment processor identifier (e.g., GLOBALPAY, STRIPE, PAYPAL)
      
      - name: transaction_date_time
        description: ISO 8601 formatted timestamp of the transaction
      
      - name: transaction_state
        description: Transaction state (ACCEPTED or DECLINED)
      
      - name: cvv_provided
        description: Whether CVV was provided with the transaction
      
      - name: amount_local
        description: Transaction amount in local currency
      
      - name: amount_usd
        description: Transaction amount converted to USD using the exchange rate from the rates field
      
      - name: country
        description: Two-character ISO country code of the card origin
      
      - name: currency
        description: Three-character ISO 4217 currency code
            
      - name: transaction_date
        description: Date portion of the transaction timestamp
      
      - name: is_accepted
        description: Binary flag indicating if transaction was accepted (1 = yes, 0 = no)
      
      - name: is_declined
        description: Binary flag indicating if transaction was declined (1 = yes, 0 = no)
