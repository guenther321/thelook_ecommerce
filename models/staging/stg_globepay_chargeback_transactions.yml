version: 2

models:
  - name: stg_globepay_chargeback_transactions
    description: |
      Staging layer for Globepay chargeback data.
      
      Globepay is a single and secure payment platform that lets you collect payments quickly from around the world in different currencies. It works across devices and is designed to increase your conversion.
      
      Globepay makes it easy to build a first-class global payments experience:
      - Designed to remove friction—Real-time card validation with built-in error messaging
      - Mobile-ready—Fully responsive design
      - International—Supports 15 languages and multiple payment currencies
      - Customization and branding—Customizable buttons and background color
      - Fraud and compliance—Simplified PCI compliance and SCA-ready
      - Additional features—Collect addresses, send email receipts, and more
      
      This model provides a 1:1 view of raw chargeback transaction data with minimal transformations for downstream consumption.
    
    columns:
      - name: external_ref
        description: Unique external reference identifier for the transaction (evt_*)
        tests:
          - unique
          - not_null
      
      - name: status
        description: |
          Globepay status indicator (TRUE/FALSE). 
          NOTE: Purpose is undocumented in Globepay API spec. 
          Likely indicates record validity/confirmation status. Requires clarification with data team.
      
      - name: source
        description: Data source system identifier (GLOBALPAY)
      
      - name: has_chargeback
        description: |
          Boolean flag indicating whether the transaction has been chargedback.
          Values: true (chargedback), false (not chargedback)
