# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'thelook'
version: '1.0.0'
config-version: 2

profile: 'thelook'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"

models:
  thelook:
    staging:
      +materialized: view
      +on_schema_change: "fail"

    intermediate:
      +schema: intermediate
      +materialized: view
      +on_schema_change: "fail"
    
    marts:
      +schema: marts
      +materialized: table
      +on_schema_change: "fail"

    analytics:
      +schema: analytics
      +materialized: table
    
seeds:
  thelook:
    +quote_columns: true

tests:
  thelook:
    +store_failures: true

vars:
  lookback_days: 3                  # default for all incremental models
